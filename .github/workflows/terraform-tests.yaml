name: Terraform Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-modules:
    name: Discover testable modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Discover Terraform test modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          modules_json="$({
            find modules -mindepth 1 -maxdepth 1 -type d | while read -r module; do
              if [[ -d "$module/tests" ]] && find "$module/tests" -maxdepth 1 -type f -name "*.tftest.hcl" | grep -q .; then
                echo "$module"
              fi
            done
          } | jq -Rsc 'split("\n") | map(select(length > 0))')"

          echo "modules=${modules_json}" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: ${modules_json}"

      - name: Report module test coverage
        shell: bash
        run: |
          set -euo pipefail

          total_modules=$(find modules -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          tested_modules=$(echo '${{ steps.discover.outputs.modules }}' | jq 'length')
          coverage=$(awk -v t="$total_modules" -v m="$tested_modules" 'BEGIN { if (t==0) printf "0.00"; else printf "%.2f", (m/t)*100 }')

          echo "### Terraform module test coverage: ${tested_modules}/${total_modules} (${coverage}%)" >> "$GITHUB_STEP_SUMMARY"

  terraform-test:
    name: Terraform test
    runs-on: ubuntu-latest
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=${{ matrix.module }} init -backend=false

      - name: Terraform test with JSON output
        id: tf_test
        run: |
          set +e

          module_name="$(basename "${{ matrix.module }}")"
          mkdir -p test-results

          terraform -chdir=${{ matrix.module }} test -json \
            > "test-results/${module_name}-terraform-test.json"

          exit_code=$?

          if [ ! -s "test-results/${module_name}-terraform-test.json" ]; then
            echo '{"type":"test_summary","status":"error","message":"Terraform test produced no JSON output"}' \
              > "test-results/${module_name}-terraform-test.json"
          fi

          exit "$exit_code"

      - name: Prepare artifact name
        id: artifact
        if: always()
        run: |
          module_name="$(basename "${{ matrix.module }}")"
          echo "name=terraform-test-results-${module_name}" >> "$GITHUB_OUTPUT"

      - name: Upload Terraform test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: test-results/*.json
          if-no-files-found: warn

  no-test-modules:
    name: No Terraform tests found
    runs-on: ubuntu-latest
    needs: discover-modules
    if: needs.discover-modules.outputs.modules == '[]'
    steps:
      - name: Skip
        run: echo "No modules with Terraform tests were found under modules/*/tests."