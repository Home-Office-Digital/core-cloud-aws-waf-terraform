name: Terraform Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-modules:
    name: Discover testable modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover Terraform test modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          modules_json="$({
            find modules -mindepth 1 -maxdepth 1 -type d | while read -r module; do
              if [[ -d "$module/tests" ]] && find "$module/tests" -maxdepth 1 -type f -name "*.tftest.hcl" | grep -q .; then
                echo "$module"
              fi
            done
          } | jq -Rsc 'split("\n") | map(select(length > 0))')"

          echo "modules=${modules_json}" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: ${modules_json}"

      - name: Report module test coverage
        shell: bash
        run: |
          set -euo pipefail

          total_modules=$(find modules -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          tested_modules=$(echo '${{ steps.discover.outputs.modules }}' | jq 'length')
          coverage=$(awk -v t="$total_modules" -v m="$tested_modules" 'BEGIN { if (t==0) printf "0.00"; else printf "%.2f", (m/t)*100 }')

          echo "### Terraform module test coverage: ${tested_modules}/${total_modules} (${coverage}%)" >> "$GITHUB_STEP_SUMMARY"

  terraform-test:
    name: Terraform test
    runs-on: ubuntu-latest
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=${{ matrix.module }} init -backend=false

      - name: Terraform test with JUnit output
        run: |
          set -euo pipefail

          module_name="$(basename "${{ matrix.module }}")"
          mkdir -p test-results

          terraform -chdir=${{ matrix.module }} test \
            -no-color \
            -junit-xml="$GITHUB_WORKSPACE/test-results/${module_name}-terraform-test.xml"

      - name: Upload Terraform test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-test-results-${{ matrix.module }}
          path: test-results/*.xml

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - discover-modules
      - terraform-test
    if: always() && needs.discover-modules.outputs.modules != '[]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Terraform test results
        uses: actions/download-artifact@v4
        with:
          pattern: terraform-test-results-*
          path: test-results
          merge-multiple: true

      - name: Convert Terraform JUnit to SonarQube generic test execution
        run: |
          set -euo pipefail

          python3 <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          from xml.sax.saxutils import escape

          results_dir = Path("test-results")
          sonar_file = results_dir / "sonarqube-test-execution.xml"

          out = ['<testExecutions version="1">']

          for junit_file in sorted(results_dir.glob("*-terraform-test.xml")):
              module_name = junit_file.name.replace("-terraform-test.xml", "")
              test_file_path = f"modules/{module_name}/tests/terraform.tftest.hcl"

              out.append(f'  <file path="{escape(test_file_path)}">')

              root = ET.parse(junit_file).getroot()

              for case in root.iter("testcase"):
                  name = case.attrib.get("name", "terraform test")
                  duration = int(float(case.attrib.get("time", "0") or 0) * 1000)

                  out.append(f'    <testCase name="{escape(name)}" duration="{duration}">')

                  failure = case.find("failure")
                  error = case.find("error")
                  skipped = case.find("skipped")

                  if failure is not None:
                      msg = escape(failure.attrib.get("message", "failure"))
                      text = escape(failure.text or "")
                      out.append(f'      <failure message="{msg}">{text}</failure>')
                  elif error is not None:
                      msg = escape(error.attrib.get("message", "error"))
                      text = escape(error.text or "")
                      out.append(f'      <error message="{msg}">{text}</error>')
                  elif skipped is not None:
                      msg = escape(skipped.attrib.get("message", "skipped"))
                      text = escape(skipped.text or "")
                      out.append(f'      <skipped message="{msg}">{text}</skipped>')

                  out.append("    </testCase>")

              out.append("  </file>")

          out.append("</testExecutions>")

          sonar_file.write_text("\n".join(out), encoding="utf-8")
          print(sonar_file.read_text())
          PY

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=core-cloud-aws-waf-terraform
            -Dsonar.projectName=core-cloud-aws-waf-terraform
            -Dsonar.sources=.
            -Dsonar.tests=modules
            -Dsonar.test.inclusions=**/tests/*.tftest.hcl
            -Dsonar.testExecutionReportPaths=test-results/sonarqube-test-execution.xml

  no-test-modules:
    name: No Terraform tests found
    runs-on: ubuntu-latest
    needs: discover-modules
    if: needs.discover-modules.outputs.modules == '[]'
    steps:
      - name: Skip
        run: echo "No modules with Terraform tests were found under modules/*/tests."