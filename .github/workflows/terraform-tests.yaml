name: Terraform Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-modules:
    name: Discover testable modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover Terraform test modules
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          modules_json="$({
            find modules -mindepth 1 -maxdepth 1 -type d | while read -r module; do
              if [[ -d "$module/tests" ]] && find "$module/tests" -maxdepth 1 -type f -name "*.tftest.hcl" | grep -q .; then
                echo "$module"
              fi
            done
          } | jq -Rsc 'split("\n") | map(select(length > 0))')"

          echo "modules=${modules_json}" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: ${modules_json}"

      - name: Report module test coverage
        shell: bash
        run: |
          set -euo pipefail

          total_modules=$(find modules -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
          tested_modules=$(echo '${{ steps.discover.outputs.modules }}' | jq 'length')
          coverage=$(awk -v t="$total_modules" -v m="$tested_modules" 'BEGIN { if (t==0) printf "0.00"; else printf "%.2f", (m/t)*100 }')

          echo "### Terraform module test coverage: ${tested_modules}/${total_modules} (${coverage}%)" >> "$GITHUB_STEP_SUMMARY"

  terraform-test:
    name: Terraform test
    runs-on: ubuntu-latest
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=${{ matrix.module }} init -backend=false

      - name: Upload Terraform test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-test-results-${{ strategy.job-index }}
          path: test-results/*.json

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - discover-modules
      - terraform-test
    if: always() && needs.discover-modules.outputs.modules != '[]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Terraform test results
        uses: actions/download-artifact@v4
        with:
          pattern: terraform-test-results-*
          path: test-results
          merge-multiple: true

      - name: Convert Terraform JSON to SonarQube generic test execution
        run: |
          set -euo pipefail
          mkdir -p test-results

          python3 <<'PY'
          import json
          from pathlib import Path
          from xml.sax.saxutils import escape

          results_dir = Path("test-results")
          sonar_file = results_dir / "sonarqube-test-execution.xml"

          json_files = sorted(results_dir.glob("**/*-terraform-test.json"))

          out = ['<testExecutions version="1">']

          for json_file in json_files:
              module_name = json_file.name.replace("-terraform-test.json", "")
              test_file_path = f"modules/{module_name}/tests/terraform.tftest.hcl"

              out.append(f'  <file path="{escape(test_file_path)}">')

              for line in json_file.read_text(errors="ignore").splitlines():
                  if not line.strip():
                      continue

                  try:
                      event = json.loads(line)
                  except json.JSONDecodeError:
                      continue

                  if event.get("@level") != "error" and event.get("type") != "test_run":
                      continue

                  if event.get("type") == "test_run":
                      name = event.get("test_name") or event.get("run_name") or "terraform test"
                      status = event.get("status", "unknown")

                      out.append(f'    <testCase name="{escape(name)}" duration="0">')

                      if status == "fail":
                          msg = escape(event.get("@message", "Terraform test failed"))
                          out.append(f'      <failure message="{msg}">{msg}</failure>')

                      out.append("    </testCase>")

              out.append("  </file>")

          out.append("</testExecutions>")

          sonar_file.write_text("\n".join(out), encoding="utf-8")
          print(f"Converted {len(json_files)} Terraform JSON files")
          print(sonar_file.read_text())
          PY

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=core-cloud-aws-waf-terraform
            -Dsonar.projectName=core-cloud-aws-waf-terraform
            -Dsonar.sources=.
            -Dsonar.tests=modules
            -Dsonar.test.inclusions=**/tests/*.tftest.hcl
            -Dsonar.testExecutionReportPaths=test-results/sonarqube-test-execution.xml

  no-test-modules:
    name: No Terraform tests found
    runs-on: ubuntu-latest
    needs: discover-modules
    if: needs.discover-modules.outputs.modules == '[]'
    steps:
      - name: Skip
        run: echo "No modules with Terraform tests were found under modules/*/tests."